<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>قائمة المنتجات</title>
</head>
<body>

<h1>قائمة المنتجات</h1>

<a href="{{ url_for('add_product') }}">
    <button>إضافة منتج</button>
</a>

<div>

    {% for product in products_list %}

    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
        <img src="{{ product.image }}" style="width:150px;">

        <h3>{{ product.name }}</h3>
        <p>السعر: {{ product.price }}</p>

        <a href="{{ url_for('product_details', product_name=product.name) }}">
            <button>تفاصيل</button>
        </a>

        <a href="{{ url_for('delete_product', product_name=product.name) }}">
            <button style="background:red;color:white;">حذف</button>
        </a>

    </div>

    {% endfor %}

</div>

</body>
</html>
